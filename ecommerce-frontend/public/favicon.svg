<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square — indigo signal -->
  <rect width="32" height="32" rx="7" fill="#4f46e5"/>
  <!--
    E-shelves mark: three horizontal bars of decreasing width
    read simultaneously as:
      1. "E" letterform (EcommAdmin)
      2. a store's catalog hierarchy (top shelf full, mid shelf mid, bottom shelf full)
      3. a data table / dashboard row system
    The vertical spine anchors all three bars.
  -->
  <!-- Vertical spine -->
  <rect x="8" y="8" width="2.5" height="16" rx="1.25" fill="white"/>
  <!-- Top bar — full width -->
  <rect x="8" y="8" width="16" height="2.5" rx="1.25" fill="white"/>
  <!-- Mid bar — shorter (hierarchy) -->
  <rect x="8" y="14.75" width="11" height="2.5" rx="1.25" fill="white"/>
  <!-- Bottom bar — full width -->
  <rect x="8" y="21.5" width="16" height="2.5" rx="1.25" fill="white"/>
</svg>
